<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת הטמעה</title>
<style>
  body{ font-family:system-ui, sans-serif; background:#eef1f6; margin:0; padding:24px; color:#222; }
  .site-header{ max-width:960px; margin:0 auto 16px; }
  h1{ font-size:22px; }
  .frame-wrap{ max-width:960px; margin:0 auto; }
  iframe{ width:100%; aspect-ratio:16/9; border:0; border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,.2); display:block; }
  p{ color:#555; }
</style>
</head>
<body>
  <div class="site-header">
    <h1>אתר לדוגמה — עמוד של מכינת 720</h1>
    <p>המשחק מוטמע כאן דרך iframe, בדיוק כמו שיוטמע ב-Wix / Google Sites:</p>
  </div>
  <div class="frame-wrap">
    <iframe src="index.html" allow="autoplay" title="יום ראשון, שיעור ראשון"></iframe>
  </div>
</body>
</html>
